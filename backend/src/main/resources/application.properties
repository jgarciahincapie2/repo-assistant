server.port=8080
# Bind to all interfaces so other devices on the network can connect
server.address=0.0.0.0

# Ollama
app.ollama.url=http://localhost:11434
app.ollama.embed-model=nomic-embed-text
app.ollama.llm-model=llama3.1:8b

# Qdrant
app.qdrant.url=http://localhost:6333
app.qdrant.collection=repo_embeddings

# Repo cloning
app.repo.local-path=./repos

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS — allow all origins (devices on LAN)
app.cors.allowed-origins=*

# Auth tokens (change these before deploying)
app.auth.admin-token=admin-secret-2024
app.auth.user-token=user-secret-2024
